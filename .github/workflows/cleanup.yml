name: Cleanup stale claims

# Hourly safety net.
# Releases tasks claimed more than 65 minutes ago. A healthy solver job
# finishes well within its 350-min timeout AND marks its task done/bail
# itself; a job that crashes hard releases its own claim via the
# "Release claim if solve failed mid-run" step in solve-tasks.yml.
# This workflow only catches the rare case where even that release step
# couldn't run (e.g. runner killed by GitHub).
#
# Also deletes orphan progress files (whose task is no longer claimed).

on:
  schedule:
    - cron: '17 * * * *'      # offset from solve.yml's :00/:15/:30/:45
  workflow_dispatch:

concurrency:
  group: cleanup
  cancel-in-progress: false

permissions:
  contents: write

env:
  FPF_PROJECT: REZN
  STALE_MIN: '65'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "fpf-cleanup[bot]"
          git config user.email "fpf-cleanup@users.noreply.github.com"

      - name: Release stale claims and delete orphan progress files
        env:
          QUEUE: projects/${{ env.FPF_PROJECT }}/TASK_QUEUE.json
          PROGRESS_DIR: projects/${{ env.FPF_PROJECT }}/progress
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/cleanup_report.txt
          import json, os, datetime
          from pathlib import Path

          STALE_MIN = int(os.environ["STALE_MIN"])
          QUEUE = Path(os.environ["QUEUE"])
          PDIR = Path(os.environ["PROGRESS_DIR"])

          q = json.loads(QUEUE.read_text())
          now = datetime.datetime.now(datetime.timezone.utc)
          released, claimed_ids = [], set()

          for t in q["tasks"]:
              if t.get("status") != "claimed":
                  continue
              ca = t.get("claimed_at")
              if not ca:
                  continue
              try:
                  ca_dt = datetime.datetime.fromisoformat(ca.replace("Z", "+00:00"))
              except Exception:
                  continue
              age_min = (now - ca_dt).total_seconds() / 60
              if age_min > STALE_MIN:
                  released.append((t["id"], t.get("claimed_by"), int(age_min)))
                  t["status"] = "ready"
                  t["claimed_by"] = None
                  t["claimed_at"] = None
              else:
                  claimed_ids.add(t["id"])

          QUEUE.write_text(json.dumps(q, indent=2) + "\n")

          deleted = []
          if PDIR.is_dir():
              for f in sorted(PDIR.glob("*.json")):
                  if f.stem not in claimed_ids:
                      f.unlink()
                      deleted.append(f.name)

          print(f"released={len(released)}")
          print(f"orphan_progress={len(deleted)}")
          for tid, who, age in released:
              print(f"  released {tid} (was {who}, age {age}m)")
          for f in deleted:
              print(f"  deleted progress/{f}")
          PY
          cat /tmp/cleanup_report.txt

      - name: Commit cleanup
        run: |
          set -euo pipefail
          git add -A "projects/${FPF_PROJECT}/"
          if git diff --cached --quiet; then
            echo "Nothing to clean up."
            exit 0
          fi
          git commit -m "Hourly cleanup: release stale claims, drop orphan progress"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "push OK on attempt $attempt"
              exit 0
            fi
            git pull --rebase origin main
            sleep $((attempt * 2))
          done
          echo "Could not push cleanup commit after 5 attempts."
          exit 1

      - name: Summary
        if: always()
        run: |
          {
            echo "## Cleanup"
            echo ""
            echo '```'
            cat /tmp/cleanup_report.txt 2>/dev/null || echo "(no report)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
