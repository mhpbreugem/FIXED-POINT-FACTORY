<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>fixed-point-factory — status</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg: #fafafa; --fg: #222; --muted: #888;
    --done: #2a7a2e; --ready: #1f6feb; --claimed: #b78700;
    --bailed: #b1260f; --blocked: #999; --skip: #ccc;
    --row: #fff; --rowalt: #f3f3f3; --hdr: #e8e8e8;
    --stale: #b1260f;
  }
  body { font-family: ui-sans-serif, system-ui, sans-serif;
         background: var(--bg); color: var(--fg); margin: 0; padding: 1.5rem; }
  h1 { font-size: 1.25rem; margin: 0 0 0.5rem 0; }
  h2 { font-size: 1rem; margin: 1.5rem 0 0.5rem 0; }
  h3 { font-size: 0.95rem; margin: 1.2rem 0 0.4rem 0; color: #333; }
  .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; }
  .summary { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0.5rem 0 1rem 0; }
  .pill { padding: 0.2rem 0.6rem; border-radius: 0.4rem; font-size: 0.85rem;
          color: white; font-weight: 600; }
  .pill.done    { background: var(--done); }
  .pill.ready   { background: var(--ready); }
  .pill.claimed { background: var(--claimed); }
  .pill.blocked { background: var(--blocked); }
  .pill.bailed  { background: var(--bailed); }
  .pill.skip    { background: var(--skip); color: #444; }
  table { border-collapse: collapse; width: 100%; font-size: 0.85rem;
          background: var(--row); }
  th, td { text-align: left; padding: 0.35rem 0.6rem; border-bottom: 1px solid #eee; }
  th { background: var(--hdr); font-weight: 600; cursor: pointer; user-select: none;
       position: sticky; top: 0; }
  th:hover { background: #ddd; }
  tr:nth-child(even) td { background: var(--rowalt); }
  td.status { font-weight: 600; }
  td.status.done    { color: var(--done); }
  td.status.ready   { color: var(--ready); }
  td.status.claimed { color: var(--claimed); }
  td.status.blocked { color: var(--blocked); }
  td.status.bailed  { color: var(--bailed); }
  td.status.skip    { color: #aaa; }
  .tabs { display: flex; gap: 0.3rem; margin-bottom: 1rem; }
  .tab { padding: 0.3rem 0.8rem; border: 1px solid #ccc; border-radius: 0.3rem;
         cursor: pointer; background: #fff; font-size: 0.85rem; }
  .tab.active { background: #222; color: #fff; border-color: #222; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .err { color: var(--bailed); }
  .stale { color: var(--stale); font-weight: 600; }
  .mono { font-family: ui-monospace, monospace; font-size: 0.8rem; }
  .worker-table td, .worker-table th { padding: 0.25rem 0.5rem; }
  .progress-bar-wrap { width: 120px; background: #eee; border-radius: 3px;
                       display: inline-block; vertical-align: middle; }
  .progress-bar { height: 8px; border-radius: 3px; background: var(--claimed); }
  svg.chart { overflow: visible; }
  .chart-wrap { margin: 0.5rem 0 1.5rem 0; }
  /* mini chart axis */
  .axis-label { font-size: 10px; fill: #888; }
  .grid-line { stroke: #eee; stroke-width: 1; }
  .paper-section { margin: 2rem 0 0.5rem 0; padding: 0.5rem 0 0 0;
                   border-top: 2px solid #ddd; }
  .nl-badge { display: inline-block; font-size: 0.7rem; background: #e8e8e8;
              border-radius: 0.3rem; padding: 0.1rem 0.4rem; color: #555;
              vertical-align: middle; margin-left: 0.4rem; }
  table.nl-table { font-size: 0.82rem; border-collapse: collapse; width: auto; min-width: 420px; }
  .heatcell { font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<h1>fixed-point-factory — <span id="project-label">REZN</span></h1>
<p class="meta" id="meta">loading…</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab('tasks')">Tasks</button>
  <button class="tab" onclick="switchTab('workers')">Workers</button>
  <button class="tab" onclick="switchTab('figures')">Figures</button>
</div>

<!-- refresh button outside tabs -->
<div style="margin-bottom:0.5rem">
  <button onclick="loadAll()">refresh now</button>
</div>

<div id="tab-tasks" class="tab-content active">
  <div class="summary" id="summary"></div>
  <table id="task-table">
    <thead><tr>
      <th onclick="sortBy('id')">ID</th>
      <th onclick="sortBy('gamma')">&#947;</th>
      <th onclick="sortBy('tau')">&#964;</th>
      <th onclick="sortBy('status')">Status</th>
      <th onclick="sortBy('1-R2')">1‑R²</th>
      <th>Note</th>
      <th>Depends on</th>
    </tr></thead>
    <tbody id="task-body"></tbody>
  </table>
</div>

<div id="tab-workers" class="tab-content">
  <h2>Active workers</h2>
  <table class="worker-table" id="worker-table">
    <thead><tr>
      <th>Worker</th><th>Task</th><th>Heartbeat</th><th>Age</th>
      <th>Iter</th><th>F-tol</th><th>Progress</th>
    </tr></thead>
    <tbody id="worker-body"></tbody>
  </table>
</div>

<div id="tab-figures" class="tab-content">
  <div id="fig-area"></div>
</div>

<script>
  const OWNER = "mhpbreugem", REPO = "fixed-point-factory", BRANCH = "main";
  const PROJECT = "REZN";
  let taskData = null, workerData = null, progressData = {};
  let sortCol = "id", sortAsc = true;
  let FIGDATA = null;

  function rawUrl(path) {
    return `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${path}`;
  }
  function apiUrl(path) {
    return `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`;
  }

  async function fetchJson(url) {
    const r = await fetch(url, {cache:"no-store"});
    if (!r.ok) throw new Error(`${r.status} ${r.statusText} — ${url}`);
    return r.json();
  }
  async function fetchText(url) {
    const r = await fetch(url, {cache:"no-store"});
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.text();
  }

  function switchTab(name) {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(d => d.classList.remove("active"));
    document.getElementById(`tab-${name}`).classList.add("active");
    event.target.classList.add("active");
    if (name === "figures") renderFigures();
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TASK LOADING
  // ═══════════════════════════════════════════════════════════════════════════

  async function loadTasks() {
    const data = await fetchJson(rawUrl(`projects/${PROJECT}/TASK_QUEUE.json`));
    taskData = data;
    renderTasks();
    document.getElementById("meta").textContent =
      `last refresh: ${new Date().toLocaleTimeString()}  ·  updated_at: ${data.updated_at || "?"}  ·  project: ${PROJECT}`;
  }

  function renderTasks() {
    if (!taskData) return;
    const tasks = taskData.tasks || [];

    // summary pills
    const counts = {};
    tasks.forEach(t => { counts[t.status] = (counts[t.status]||0)+1; });
    const pillOrder = ["done","ready","claimed","blocked","bailed","skip"];
    document.getElementById("summary").innerHTML =
      pillOrder.filter(s => counts[s]).map(s =>
        `<span class="pill ${s}">${s}: ${counts[s]}</span>`).join("") +
      `<span class="pill" style="background:#555">total: ${tasks.length}</span>`;

    // sort
    const sorted = [...tasks].sort((a,b) => {
      let av = a[sortCol] ?? a.result?.[sortCol] ?? "";
      let bv = b[sortCol] ?? b.result?.[sortCol] ?? "";
      if (typeof av === "number" && typeof bv === "number")
        return sortAsc ? av-bv : bv-av;
      return sortAsc ? String(av).localeCompare(String(bv))
                     : String(bv).localeCompare(String(av));
    });

    // render rows
    document.getElementById("task-body").innerHTML = sorted.map(t => {
      const r2 = t.result?.["1-R2"];
      const r2str = r2 != null ? r2.toFixed(4) : "";
      const deps = (t.depends_on||[]).join(", ");
      return `<tr>
        <td class="mono">${esc(t.id)}</td>
        <td>${t.gamma != null ? t.gamma : ""}</td>
        <td>${t.tau  != null ? t.tau  : ""}</td>
        <td class="status ${t.status}">${t.status}</td>
        <td>${r2str}</td>
        <td style="max-width:260px;font-size:0.78rem;color:#555">${esc(t.note||"")}${
          t.test ? " <em>(test)</em>" : ""}</td>
        <td class="mono" style="font-size:0.78rem;color:#888">${esc(deps)}</td>
      </tr>`;
    }).join("");
  }

  function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    renderTasks();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // WORKER / PROGRESS LOADING
  // ═══════════════════════════════════════════════════════════════════════════

  async function loadWorkers() {
    try {
      const hbDir = await fetchJson(apiUrl(`projects/${PROJECT}/heartbeats`));
      workerData = Array.isArray(hbDir) ? hbDir : [];
    } catch { workerData = []; }
  }

  async function loadProgress() {
    try {
      const pDir = await fetchJson(apiUrl(`projects/${PROJECT}/progress`));
      if (!Array.isArray(pDir)) return;
      progressData = {};
      await Promise.all(pDir.filter(f => f.name.endsWith(".json")).map(async f => {
        try {
          const d = await fetchJson(rawUrl(`projects/${PROJECT}/progress/${f.name}`));
          progressData[d.task_id] = d;
        } catch {}
      }));
      renderWorkers();
    } catch {}
  }

  function renderWorkers() {
    const tbody = document.getElementById("worker-body");
    if (!workerData || workerData.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" style="color:#888">no heartbeat files found</td></tr>`;
      return;
    }
    const now = Date.now();
    tbody.innerHTML = workerData.map(f => {
      const workerName = f.name.replace(".txt","");
      const hbAge = f.last_modified ? Math.round((now - new Date(f.last_modified).getTime())/60000) : null;
      const isStale = hbAge != null && hbAge > 10;
      const pr = progressData[workerName] || Object.values(progressData).find(p => p.worker_id === workerName);
      const iter  = pr ? pr.iter  : "";
      const ftol  = pr ? pr.ftol  : "";
      const taskId = pr ? pr.task_id : "";
      const maxIter = pr ? pr.max_iter : null;
      const pctStr = (pr && maxIter) ? Math.round(pr.iter/maxIter*100)+"%" : "";
      const barW   = (pr && maxIter) ? Math.round(pr.iter/maxIter*80) : 0;
      return `<tr>
        <td class="mono">${esc(workerName)}</td>
        <td class="mono">${esc(taskId)}</td>
        <td>${hbAge != null ? (isStale ? `<span class="stale">${hbAge}m ago</span>` : `${hbAge}m ago`) : "?"}</td>
        <td>${hbAge != null ? hbAge + "m" : "?"}</td>
        <td>${iter}</td>
        <td class="mono">${ftol ? Number(ftol).toExponential(1) : ""}</td>
        <td><div class="progress-bar-wrap"><div class="progress-bar" style="width:${barW}px"></div></div> ${pctStr}</td>
      </tr>`;
    }).join("");
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // LOAD ALL
  // ═══════════════════════════════════════════════════════════════════════════

  async function loadAll() {
    document.getElementById("meta").textContent = "loading…";
    try {
      await loadTasks();
      await Promise.all([loadWorkers(), loadProgress(), loadFiguresData()]);
      if (document.getElementById("tab-figures").classList.contains("active"))
        renderFigures();
    } catch (e) {
      document.getElementById("meta").innerHTML = `<span class="err">error: ${esc(e.message)}</span>`;
    }
  }

  loadAll();
  setInterval(loadAll, 30000);

  // ═══════════════════════════════════════════════════════════════════════════
  // FIGURES TAB
  // ═══════════════════════════════════════════════════════════════════════════

  const STATUS_COLOR = {
    done: "#2a7a2e", ready: "#1f6feb", claimed: "#b78700",
    bailed: "#b1260f", blocked: "#bbb", skip: "#ccc"
  };

  // ——— SVG mini-chart helper ———
  function miniChart({
    data,        // [{x, y, color?, label?}] or [{x, y}]
    series,      // [{label, color, pts:[{x,y}]}]  (alternative to data)
    width=520, height=200, padL=50, padR=20, padT=15, padB=40,
    xLabel="", yLabel="", title="",
    xLog=false, yLog=false,
    xMin, xMax, yMin, yMax,
    hLines=[],    // [{y, color, dash}]
    refLine,      // {slope, intercept, color}  y = slope*x + intercept
    dots=true, lines=true,
  }) {
    // collect all points
    const allPts = series ? series.flatMap(s=>s.pts) : (data||[]);
    const xs = allPts.map(p=>p.x), ys = allPts.map(p=>p.y);
    const x0 = xMin ?? Math.min(...xs), x1 = xMax ?? Math.max(...xs);
    const y0 = yMin ?? Math.min(...ys), y1 = yMax ?? Math.max(...ys);
    const W = width-padL-padR, H = height-padT-padB;

    const px = x => padL + (xLog ? Math.log(x/x0)/Math.log(x1/x0)*W : (x-x0)/(x1-x0)*W);
    const py = y => padT + H - (yLog ? Math.log(Math.max(y,1e-9)/y0)/Math.log(y1/y0)*H : (y-y0)/(y1-y0)*H);

    let svg = `<svg class="chart" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">`;

    // grid lines + x ticks
    const nxt = 6;
    for (let i=0;i<=nxt;i++) {
      const xv = xLog ? x0*Math.pow(x1/x0,i/nxt) : x0+(x1-x0)*i/nxt;
      const xp = px(xv);
      svg += `<line x1="${xp}" y1="${padT}" x2="${xp}" y2="${padT+H}" class="grid-line"/>`;
      svg += `<text x="${xp}" y="${padT+H+14}" text-anchor="middle" class="axis-label">${xv<0.01?xv.toExponential(0):(xv>=100?xv.toFixed(0):xv.toPrecision(2))}</text>`;
    }
    const nyt = 5;
    for (let i=0;i<=nyt;i++) {
      const yv = yLog ? y0*Math.pow(y1/y0,i/nyt) : y0+(y1-y0)*i/nyt;
      const yp = py(yv);
      svg += `<line x1="${padL}" y1="${yp}" x2="${padL+W}" y2="${yp}" class="grid-line"/>`;
      svg += `<text x="${padL-4}" y="${yp+4}" text-anchor="end" class="axis-label">${yv.toPrecision(2)}</text>`;
    }

    // axis labels
    if (xLabel) svg += `<text x="${padL+W/2}" y="${height-4}" text-anchor="middle" class="axis-label" font-size="11">${xLabel}</text>`;
    if (yLabel) svg += `<text x="12" y="${padT+H/2}" text-anchor="middle" class="axis-label" font-size="11" transform="rotate(-90,12,${padT+H/2})">${yLabel}</text>`;
    if (title)  svg += `<text x="${padL+W/2}" y="${padT-3}" text-anchor="middle" class="axis-label" font-size="11" fill="#444">${title}</text>`;

    // hLines
    hLines.forEach(({y,color="#ccc",dash="4 2"}) => {
      svg += `<line x1="${padL}" y1="${py(y)}" x2="${padL+W}" y2="${py(y)}" stroke="${color}" stroke-width="1" stroke-dasharray="${dash}"/>`;
    });

    // series or single data
    const seriesList = series || [{label:null, color:"#1f6feb", pts: data||[]}];
    seriesList.forEach(s => {
      const pts = s.pts.filter(p => p.y != null && isFinite(p.y));
      if (lines && pts.length > 1) {
        const pathD = pts.map((p,i)=>`${i===0?"M":"L"}${px(p.x).toFixed(1)},${py(p.y).toFixed(1)}`).join(" ");
        svg += `<path d="${pathD}" fill="none" stroke="${s.color||'#1f6feb'}" stroke-width="1.5"/>`;
      }
      if (dots) pts.forEach(p => {
        svg += `<circle cx="${px(p.x).toFixed(1)}" cy="${py(p.y).toFixed(1)}" r="3" fill="${s.color||p.color||'#1f6feb'}" opacity="0.85"/>`;
      });
    });

    // legend
    if (series && series.length > 1) {
      let lx = padL + W - 10, ly = padT + 10;
      [...series].reverse().forEach(s => {
        svg += `<rect x="${lx-36}" y="${ly-8}" width="14" height="3" fill="${s.color}"/>`;
        svg += `<text x="${lx-18}" y="${ly+3}" class="axis-label" font-size="10" fill="${s.color}">${s.label||""}</text>`;
        ly += 14;
      });
    }

    svg += `</svg>`;
    return svg;
  }

  // ——— Task-queue scatter: 1-R² vs τ per γ slice ———
  function renderScatter(map) {
    const gammas = [0.25, 0.35, 0.5, 1.0, 1.4, 2.0, 4.0];
    const colors = ["#d62728","#bcbd22","#1f77b4","#ff7f0e","#9467bd","#8c564b","#2ca02c"];
    const series = gammas.map((g,i) => ({
      label: `γ=${g}`,
      color: colors[i],
      pts: (map.get(g)||[]).map(t => ({x:t.tau, y:t["1-R2"]})).filter(p=>p.y!=null)
    })).filter(s=>s.pts.length);
    return miniChart({series, xLabel:"τ", yLabel:"1‑R² (REE)", xLog:false,
                      xMin:0, xMax:11, yMin:0, yMax:0.12, dots:true, lines:true,
                      hLines:[{y:0,color:"#aaa",dash:"2 2"}]});
  }

  // ——— γ-sweep table (cross-section at fixed τ) ———
  function lookup(map, gamma, tau) {
    const arr = map.get(gamma)||[];
    const t = arr.find(x => Math.abs(x.tau - tau) < 0.001);
    return t ? t["1-R2"] : null;
  }

  function renderGammaTable(id, gammas, tau, map) {
    const el = document.getElementById(id);
    if (!el) return;
    const rows = gammas.map(g => {
      const v = lookup(map, g, tau);
      return `<tr><td>γ = ${g}</td><td>${v != null ? v.toFixed(4) : '<span style="color:#aaa">pending</span>'}</td></tr>`;
    });
    el.innerHTML = `<table style="font-size:0.85rem">
      <thead><tr><th>Risk aversion γ</th><th>1‑R² (REE, τ=${tau})</th></tr></thead>
      <tbody>${rows.join("")}</tbody>
    </table><p style="font-size:0.78rem;color:#888;margin-top:0.3rem">
      Tab. D footnote: weighted 1‑R² at τ=${tau}.
    </p>`;
  }

  // ——— Grid-params table ———
  function renderGridTable(id, map) {
    const el = document.getElementById(id);
    if (!el) return;
    const allTasks = [];
    map.forEach((arr) => arr.forEach(t => allTasks.push(t)));
    const done = allTasks.filter(t => t.status==="done" && t.result);
    if (!done.length) { el.innerHTML="<p>No done tasks yet.</p>"; return; }
    el.innerHTML = `<table style="font-size:0.82rem">
      <thead><tr><th>Task</th><th>γ</th><th>τ</th><th>1‑R²</th><th>F_max</th><th>n_triples</th></tr></thead>
      <tbody>${done.map(t=>`<tr>
        <td class="mono">${esc(t.id)}</td><td>${t.gamma}</td><td>${t.tau}</td>
        <td>${t.result["1-R2"]?.toFixed(4)||""}</td>
        <td class="mono">${t.result.F_max!=null ? Number(t.result.F_max).toExponential(1) : ""}</td>
        <td>${t.result.n_triples||""}</td>
      </tr>`).join("")}</tbody>
    </table>`;
  }

  // ——— Main figures render entry point ———
  function renderFigures() {
    if (!taskData) return;
    const el = document.getElementById("fig-area");

    const map = new Map();
    (taskData.tasks||[]).forEach(t => {
      if (t.gamma == null || t.test) return;
      if (!map.has(t.gamma)) map.set(t.gamma, []);
      map.get(t.gamma).push(t);
    });

    el.innerHTML = `
    <div class="paper-section">
      <h2>Fig. 1 — No-learning 1‑R² heatmap <span class="nl-badge">no-learning</span></h2>
      <p style="font-size:0.85rem;color:#555">Weighted 1‑R² in the no-learning equilibrium (agents use only own signal, not price).
         Rows: γ (risk aversion). Columns: τ (signal precision). CARA (γ=100≈∞) gives 1‑R²≈0 at all τ.</p>
      <div id="fig-nl-table"></div>
    </div>

    <div class="paper-section">
      <h2>Fig. 2 — No-learning 1‑R² vs τ <span class="nl-badge">no-learning</span></h2>
      <p style="font-size:0.85rem;color:#555">How price informativeness varies with signal precision under no-learning.
         Each line is one γ value. Non-monotone for low γ: at low τ signals are noisy so prices are uninformative;
         at high τ signals are precise and the contour becomes close to the CARA straight line.</p>
      <div class="chart-wrap" id="chart-nl-tau"></div>
      <h3>REE vs no-learning comparison (at completed tasks)</h3>
      <p style="font-size:0.85rem;color:#555">Filled markers = REE (from solver). Open markers = no-learning. REE is always more informative (lower 1‑R²).</p>
      <div class="chart-wrap" id="chart-ree-vs-nl"></div>
    </div>

    <div class="paper-section">
      <h2>Fig. 3 — Market-clearing contours: CARA vs CRRA <span class="nl-badge">no-learning</span></h2>
      <p style="font-size:0.85rem;color:#555">Contour C(u₁, p₀) = {(u₂, u₃) : market clears at p₀} for a fixed agent
         with signal u₁=0 at τ=2. Under CARA the contour is a straight line (T*=const).
         Under CRRA (γ=0.5) it bows inward. The curvature is the geometric source of 1‑R²&gt;0.</p>
      <div style="display:flex;gap:1rem;flex-wrap:wrap">
        <div><strong>CRRA (γ=0.5)</strong><div class="chart-wrap" id="chart-contour-crca"></div></div>
        <div><strong>CARA (γ→∞)</strong><div class="chart-wrap" id="chart-contour-cara"></div></div>
      </div>
    </div>

    <div class="paper-section">
      <h2>Fig. 4 — REE 1‑R² vs τ (solver output)</h2>
      <p style="font-size:0.85rem;color:#555">From completed solver tasks. Dots are converged REE fixed points.</p>
      <div class="chart-wrap">${renderScatter(map)}</div>
    </div>

    <div class="paper-section">
      <h2>Fig. 5 / Table D — γ-sweep at τ = 1.0 (cross-section)</h2>
      <p style="font-size:0.85rem;color:#555">1‑R² as a function of risk aversion γ at fixed τ=1.0.
         Shows knife-edge: CARA is the unique class giving 0.</p>
      <div id="tbl-gamma-sweep"></div>
    </div>

    <div class="paper-section">
      <h2>Grid parameters / all done tasks</h2>
      <div id="tbl-grid"></div>
    </div>

    <div class="paper-section">
      <h2>Fig. 7 — Trading volume vs γ <span class="nl-badge">no-learning</span></h2>
      <p style="font-size:0.85rem;color:#555">Expected absolute demand E[|x|] in no-learning equilibrium at τ=2.
         Monotone decreasing in γ: more risk-averse agents trade less.</p>
      <div class="chart-wrap" id="chart-fig7"></div>
    </div>

    <div class="paper-section">
      <h2>Fig. 8 — Value of information vs τ <span class="nl-badge">no-learning</span></h2>
      <p style="font-size:0.85rem;color:#555">V(τ) = E[U(trade on signal)] − E[U(no trade)] in no-learning equilibrium.
         Negative: adverse-selection costs exceed information gains (no-learning only; full REE would differ).</p>
      <div class="chart-wrap" id="chart-fig8"></div>
    </div>

    <div class="paper-section">
      <h2>Fig. 10 — 1‑R² vs number of agents K <span class="nl-badge">no-learning</span></h2>
      <p style="font-size:0.85rem;color:#555">No-learning 1‑R² as a function of K agents at τ=2.
         All γ converge toward 0 as K→∞ (more agents → price more informative).</p>
      <div class="chart-wrap" id="chart-fig10"></div>
    </div>

    <p style="font-size:0.78rem;color:#aaa;margin-top:2rem">
      <span id="figdata-status">loading figure data…</span>
    </p>
    `;

    renderGammaTable("tbl-gamma-sweep", [0.25, 0.35, 0.5, 1.0, 1.4, 2.0, 4.0], 1.0, map);
    renderGridTable("tbl-grid", map);
    renderPaperFigures(map);
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // PAPER FIGURES DATA + RENDERING
  // ═══════════════════════════════════════════════════════════════════════════

  async function loadFiguresData() {
    try {
      FIGDATA = await fetchJson(rawUrl("docs/figures_data.json"));
      document.getElementById("figdata-status").textContent = "data loaded";
    } catch (e) {
      document.getElementById("figdata-status").textContent = "figures data unavailable";
    }
  }

  const NL_GAMMA_COLOR = {
    "0.1": "#9c27b0", "0.25": "#d62728", "0.5": "#1f77b4",
    "1.0": "#ff7f0e", "1.4": "#bcbd22", "2.0": "#9467bd",
    "4.0": "#2ca02c", "10.0": "#8c564b", "100.0": "#aaa",
  };
  function nlGammaColor(g) { return NL_GAMMA_COLOR[String(g)] || "#888"; }

  function heatColor(v, lo, hi) {
    const t = Math.max(0, Math.min(1, (v - lo) / (hi - lo)));
    const r = Math.round(255 * t), b = Math.round(200 * (1 - t));
    return `rgb(${r},${Math.round(40 + 40*(1-t))},${b})`;
  }

  function renderFig1(data) {
    const gammas = ["0.1","0.25","0.5","1.0","1.4","2.0","4.0","10.0","100.0"];
    const taus   = ["0.5","1.0","2.0","3.0"];
    const allVals = gammas.flatMap(g => taus.map(t => data[g][t] || 0));
    const lo = 0, hi = Math.max(...allVals);
    let html = `<table class="nl-table"><thead><tr><th>γ \ τ</th>${taus.map(t=>`<th>${t}</th>`).join("")}</tr></thead><tbody>`;
    for (const g of gammas) {
      const label = g === "100.0" ? "100 (≈CARA)" : g;
      html += `<tr><td><strong>${label}</strong></td>${taus.map(t => {
        const v = data[g]?.[t];
        if (v == null) return `<td class="heatcell" style="color:#ccc">—</td>`;
        const bg = heatColor(v, lo, hi);
        return `<td class="heatcell" style="background:${bg};color:#fff;padding:0.3rem 0.6rem">${v.toFixed(3)}</td>`;
      }).join("")}</tr>`;
    }
    html += `</tbody></table>`;
    const el = document.getElementById("fig-nl-table");
    if (el) el.innerHTML = html;
  }

  function renderFig2(data, elId, yMax) {
    const el = document.getElementById(elId);
    if (!el) return;
    const gammas = Object.keys(data);
    const series = gammas.map(g => ({
      label: `γ=${g}`,
      color: nlGammaColor(g),
      pts: data[g].map(([x,y]) => ({x, y}))
    }));
    el.innerHTML = miniChart({series, xLabel:"τ", yLabel:"1‑R² (no-learning)",
                              xLog:true, xMin:0.1, xMax:10, yMin:0, yMax: yMax||0.16,
                              hLines:[{y:0,color:"#999",dash:"2 2"}]});
  }

  function renderFig3(data) {
    const crra = data.crra, cara = data.cara;
    // CRRA contour: project to (u2, u3) space — data is [u1, u2, u3]
    const crraEl = document.getElementById("chart-contour-crca");
    const caraEl = document.getElementById("chart-contour-cara");

    function contourChart(pts, color, title) {
      const u2 = pts.map(p=>p[1]), u3 = pts.map(p=>p[2]);
      const mn = Math.min(...u2,...u3), mx = Math.max(...u2,...u3);
      const W=260, H=220, pad=35;
      const sc = v => pad + (v-mn)/(mx-mn)*(W-2*pad);
      const pts2 = pts.map(p => [sc(p[1]), H-pad-(sc(p[2])-pad)]);
      let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" class="chart">`;
      // axes
      svg += `<line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#ccc" stroke-width="1"/>`;
      svg += `<line x1="${pad}" y1="${pad}" x2="${pad}" y2="${H-pad}" stroke="#ccc" stroke-width="1"/>`;
      // diagonal reference
      svg += `<line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${pad}" stroke="#ddd" stroke-dasharray="4 2" stroke-width="1"/>`;
      // contour path
      const d = pts2.map((p,i)=>`${i===0?"M":"L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
      svg += `<path d="${d}" fill="none" stroke="${color}" stroke-width="2"/>`;
      svg += `<text x="${W/2}" y="15" text-anchor="middle" class="axis-label" font-size="11">${title}</text>`;
      svg += `<text x="${W/2}" y="${H-3}" text-anchor="middle" class="axis-label">u₂</text>`;
      svg += `<text x="10" y="${H/2}" text-anchor="middle" class="axis-label" transform="rotate(-90,10,${H/2})">u₃</text>`;
      svg += `</svg>`;
      return svg;
    }

    if (crraEl) crraEl.innerHTML = contourChart(crra, "#1f77b4", `CRRA γ=${data.gamma_crra} τ=${data.tau}`);
    if (caraEl) caraEl.innerHTML = contourChart(cara, "#d62728", `CARA τ=${data.tau}`);
  }

  function renderFig7(data) {
    const el = document.getElementById("chart-fig7");
    if (!el) return;
    const pts = data.map(([x,y]) => ({x, y}));
    el.innerHTML = miniChart({data:pts, xLabel:"γ", yLabel:"E[|x|]",
                              xLog:true, xMin:0.1, xMax:100, yMin:0, yMax:1.6,
                              lines:true, dots:true,
                              hLines:[{y:0,color:"#ccc",dash:"2 2"}]});
  }

  function renderFig8(data) {
    const el = document.getElementById("chart-fig8");
    if (!el) return;
    const gammas = Object.keys(data);
    const allY = gammas.flatMap(g => data[g].map(([,y])=>y));
    const yMin = Math.min(...allY)*1.1, yMax = 0;
    const series = gammas.map(g => ({
      label: `γ=${g}`,
      color: nlGammaColor(g),
      pts: data[g].map(([x,y]) => ({x, y}))
    }));
    el.innerHTML = miniChart({series, xLabel:"τ", yLabel:"V(τ)",
                              xMin:0, xMax:5.5, yMin, yMax,
                              hLines:[{y:0,color:"#999",dash:"2 2"}]});
  }

  function renderFig10(data) {
    const el = document.getElementById("chart-fig10");
    if (!el) return;
    const gammas = Object.keys(data);
    const allY = gammas.flatMap(g => data[g].map(([,y])=>y));
    const yMax = Math.max(...allY)*1.05;
    const series = gammas.map(g => ({
      label: `γ=${g}`,
      color: nlGammaColor(g),
      pts: data[g].map(([x,y]) => ({x, y}))
    }));
    el.innerHTML = miniChart({series, xLabel:"K (agents)", yLabel:"1‑R² (no-learning)",
                              xMin:3, xMax:10, yMin:0, yMax,
                              dots:true, lines:true,
                              hLines:[{y:0,color:"#999",dash:"2 2"}]});
  }

  function renderReeVsNl(map, nlData) {
    const el = document.getElementById("chart-ree-vs-nl");
    if (!el || !nlData) return;
    const gammas = [0.25, 0.5, 1.0, 4.0];
    const colors = ["#d62728","#1f77b4","#ff7f0e","#2ca02c"];
    const series = [];
    gammas.forEach((g, gi) => {
      const color = colors[gi];
      // REE points
      const reePts = (map.get(g)||[]).filter(t=>t.result?.["1-R2"]!=null)
                                      .map(t=>({x:t.tau, y:t.result["1-R2"]}));
      if (reePts.length) series.push({label:`γ=${g} REE`, color, pts:reePts});
      // NL points
      const nlKey = String(g);
      const nlPts = (nlData[nlKey]||[]).map(([x,y])=>({x,y}));
      if (nlPts.length) series.push({label:`γ=${g} NL`, color, pts:nlPts.map(p=>({...p,_open:true}))});
    });
    el.innerHTML = miniChart({series, xLabel:"τ", yLabel:"1‑R²",
                              xLog:false, xMin:0, xMax:11, yMin:0, yMax:0.14,
                              hLines:[{y:0,color:"#ccc",dash:"2 2"}]});
  }

  function renderPaperFigures(map) {
    if (!FIGDATA) return;
    try { renderFig1(FIGDATA.fig1); } catch(e) { console.error("fig1", e); }
    try { renderFig2(FIGDATA.fig2, "chart-nl-tau", 0.16); } catch(e) { console.error("fig2", e); }
    try { renderFig3(FIGDATA.fig3); } catch(e) { console.error("fig3", e); }
    try { renderFig7(FIGDATA.fig7); } catch(e) { console.error("fig7", e); }
    try { renderFig8(FIGDATA.fig8); } catch(e) { console.error("fig8", e); }
    try { renderFig10(FIGDATA.fig10); } catch(e) { console.error("fig10", e); }
    try { renderReeVsNl(map, FIGDATA.fig2); } catch(e) { console.error("reeVsNl", e); }
  }

</script>
