<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>fixed-point-factory — status</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg: #fafafa; --fg: #222; --muted: #888;
    --done: #2a7a2e; --ready: #1f6feb; --claimed: #b78700;
    --bailed: #b1260f; --blocked: #999; --skip: #ccc;
    --row: #fff; --rowalt: #f3f3f3; --hdr: #e8e8e8;
    --stale: #b1260f;
  }
  body { font-family: ui-sans-serif, system-ui, sans-serif;
         background: var(--bg); color: var(--fg); margin: 0; padding: 1rem 1.5rem; }
  h1   { font-size: 1.2rem; margin: 0 0 .75rem; }
  h2   { font-size: 1rem; margin: 1.5rem 0 .4rem; }
  .meta { font-size: .8rem; color: var(--muted); margin-bottom: 1rem; }
  table { border-collapse: collapse; width: 100%; font-size: .82rem;
          table-layout: fixed; }
  th, td { padding: .28rem .5rem; text-align: left;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  th { background: var(--hdr); font-weight: 600; }
  tr:nth-child(even) td { background: var(--rowalt); }
  tr:nth-child(odd)  td { background: var(--row); }

  /* status badges */
  .s-done    { color: var(--done);    font-weight:600 }
  .s-ready   { color: var(--ready);   font-weight:600 }
  .s-claimed { color: var(--claimed); font-weight:600 }
  .s-bailed  { color: var(--bailed);  font-weight:600 }
  .s-blocked { color: var(--blocked); font-weight:600 }
  .s-skip    { color: var(--skip);    font-weight:600 }

  .stale     { color: var(--stale); font-weight: 600; }

  .bar-wrap  { display:inline-block; width:90px; vertical-align:middle;
               background:#ddd; border-radius:3px; height:8px; }
  .bar-fill  { display:block; height:8px; border-radius:3px;
               background: var(--done); }

  /* chart container */
  .chart-box { margin-top:.5rem; }
  svg.mini   { display:block; overflow:visible; }

  @media(max-width:600px){
    table { font-size: .74rem; }
    th, td { padding: .22rem .35rem; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
// ── tiny helpers ────────────────────────────────────────────────────────────
function esc(s){ return String(s)
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function badge(st){
  const map={
    done:"s-done", ready:"s-ready", claimed:"s-claimed",
    bailed:"s-bailed", blocked:"s-blocked", skip:"s-skip"
  };
  const cls = map[st] ?? "";
  return `<span class="${cls}">${esc(st)}</span>`;
}

function bar(n,d){
  if(!d) return "";
  const pct = Math.min(100, Math.round(n/d*100));
  return `<span class="bar-wrap"><span class="bar-fill" style="width:${pct}%"></span></span>`+
         ` ${n}/${d}`;
}

// ── mini SVG chart ───────────────────────────────────────────────────────────
/*
  miniChart({ series, xLabel, yLabel,
              xLog, xMin, xMax, yMin, yMax,
              hLines:[{y, color, dash}] })
  series = [{label, color, pts:[{x,y}]}]
*/
function miniChart(cfg){
  const W=340, H=180, PL=46, PR=10, PT=10, PB=36;
  const iW=W-PL-PR, iH=H-PT-PB;

  const {xLog=false, xMin, xMax, yMin=0, yMax, hLines=[], series} = cfg;

  function xS(v){
    if(xLog){
      return PL + (Math.log(v)-Math.log(xMin))/(Math.log(xMax)-Math.log(xMin))*iW;
    }
    return PL + (v-xMin)/(xMax-xMin)*iW;
  }
  function yS(v){ return PT+iH - (v-yMin)/(yMax-yMin)*iH; }

  // axes
  let svg = `<svg class="mini" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  // background
  svg += `<rect x="${PL}" y="${PT}" width="${iW}" height="${iH}" fill="#f6f6f6" stroke="#ccc"/>`;

  // hLines
  for(const hl of hLines){
    const y=yS(hl.y);
    svg += `<line x1="${PL}" y1="${y}" x2="${PL+iW}" y2="${y}"
              stroke="${hl.color??'#999'}" stroke-width="1"
              stroke-dasharray="${hl.dash??''}"/>`;
  }

  // x ticks
  const xTicks = xLog
    ? [0.1,0.2,0.5,1,2,5,10,20].filter(v=>v>=xMin&&v<=xMax)
    : Array.from({length:5},(_,i)=>xMin+i*(xMax-xMin)/4);
  for(const v of xTicks){
    const x=xS(v);
    svg += `<line x1="${x}" y1="${PT+iH}" x2="${x}" y2="${PT+iH+4}" stroke="#888"/>`;
    svg += `<text x="${x}" y="${PT+iH+14}" text-anchor="middle"
                  font-size="9" fill="#666">${v}</text>`;
  }

  // y ticks
  const nY=4;
  for(let i=0;i<=nY;i++){
    const v=yMin+i*(yMax-yMin)/nY;
    const y=yS(v);
    svg += `<line x1="${PL-4}" y1="${y}" x2="${PL}" y2="${y}" stroke="#888"/>`;
    svg += `<text x="${PL-6}" y="${y+3}" text-anchor="end"
                  font-size="9" fill="#666">${v.toFixed(2)}</text>`;
  }

  // series lines
  for(const s of series){
    const pts = s.pts.filter(p=>p.x>=xMin&&p.x<=xMax&&p.y>=yMin&&p.y<=yMax);
    if(pts.length<2) continue;
    const d = pts.map((p,i)=>(i?"L":"M")+xS(p.x).toFixed(1)+" "+yS(p.y).toFixed(1)).join(" ");
    svg += `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="1.5"/>`;
  }

  // axis labels
  svg += `<text x="${PL+iW/2}" y="${H-2}" text-anchor="middle"
                font-size="10" fill="#444">${esc(cfg.xLabel??'')}</text>`;
  svg += `<text x="10" y="${PT+iH/2}" text-anchor="middle"
                font-size="10" fill="#444"
                transform="rotate(-90,10,${PT+iH/2})">${esc(cfg.yLabel??'')}</text>`;

  // legend
  let lx=PL+4, ly=PT+10;
  for(const s of series){
    svg += `<line x1="${lx}" y1="${ly}" x2="${lx+16}" y2="${ly}" stroke="${s.color}" stroke-width="1.5"/>`;
    svg += `<text x="${lx+19}" y="${ly+3}" font-size="9" fill="#333">${esc(s.label)}</text>`;
    lx += 60;
    if(lx > PL+iW-40){ lx=PL+4; ly+=12; }
  }

  svg += `</svg>`;
  return svg;
}


// ── colour helpers ───────────────────────────────────────────────────────────
const PALETTE=[
  "#1f77b4","#ff7f0e","#2ca02c","#d62728","#9467bd",
  "#8c564b","#e377c2","#7f7f7f","#bcbd22","#17becf"
];
function jobColor(name){
  let h=0; for(const c of name) h=(h*31+c.charCodeAt(0))>>>0;
  return PALETTE[h%PALETTE.length];
}

const NL_GAMMA_PALETTE = {
  "0.5":"#4e79a7", "1.0":"#f28e2b", "2.0":"#e15759",
  "4.0":"#76b7b2", "8.0":"#59a14f", "100.0":"#b07aa1"
};
function nlGammaColor(g){ return NL_GAMMA_PALETTE[g] ?? "#999"; }


// ── render ───────────────────────────────────────────────────────────────────
function render(data){
  const {generated_at, jobs, workers, queue} = data;

  // ── timestamp ────────────────────────────────────────────────────────────
  const genDate   = new Date(generated_at);
  const nowDate   = new Date();
  const ageSec    = (nowDate - genDate) / 1000;
  const ageStr    = ageSec < 90   ? `${Math.round(ageSec)}s ago`
                  : ageSec < 3600 ? `${Math.round(ageSec/60)}m ago`
                  :                 `${(ageSec/3600).toFixed(1)}h ago`;
  const staleFlag = ageSec > 300;

  // ── summary counts ────────────────────────────────────────────────────────
  const total   = jobs.length;
  const nDone   = jobs.filter(j=>j.status==="done").length;
  const nReady  = jobs.filter(j=>j.status==="ready").length;
  const nClaim  = jobs.filter(j=>j.status==="claimed").length;
  const nBailed = jobs.filter(j=>j.status==="bailed").length;
  const nBlocked= jobs.filter(j=>j.status==="blocked").length;
  const nSkip   = jobs.filter(j=>j.status==="skip").length;

  // ── active workers (claimed a job within last 90 min) ────────────────────
  const cutoff90 = nowDate - 90*60*1000;
  const activeWorkers = workers.filter(w => {
    if (w.status === "claimed") return true;
    // queue-released workers: show if they released within the 90-min window
    if (w.status === "idle" || w.status === "done") {
      const t = w.last_active ? new Date(w.last_active) : null;
      return t && t >= cutoff90;
    }
    return false;
  });

  // ── HTML ──────────────────────────────────────────────────────────────────
  let html = `
<h1>fixed-point-factory — run status</h1>
<p class="meta">
  Generated: ${esc(generated_at)}
  (<span class="${staleFlag?'stale':''}">${
    staleFlag ? '⚠️ stale — ' : ''}${esc(ageStr)}</span>)
  &nbsp;|
  Total jobs: ${total}
  &nbsp;|
  <span class="s-done">✔ done: ${nDone}</span>
  &nbsp;
  <span class="s-ready">○ ready: ${nReady}</span>
  &nbsp;
  <span class="s-claimed">⧗ claimed: ${nClaim}</span>
  &nbsp;
  <span class="s-bailed">✗ bailed: ${nBailed}</span>
  &nbsp;
  <span class="s-blocked">⦸ blocked: ${nBlocked}</span>
  ${ nSkip ? `&nbsp;<span class="s-skip">∅ skip: ${nSkip}</span>` : "" }
</p>

<p>${bar(nDone, total)}</p>
`;

  // ── per-job-group progress ────────────────────────────────────────────────
  const groups = {};
  for(const j of jobs){
    const g = j.group ?? j.job_type ?? "(other)";
    if(!groups[g]) groups[g]={total:0,done:0,ready:0,claimed:0,bailed:0,blocked:0,skip:0};
    groups[g].total++;
    if(j.status in groups[g]) groups[g][j.status]++;
  }

  html += `<h2>Progress by group</h2>
<table>
<thead><tr>
  <th style="width:26%">group</th>
  <th style="width:28%">progress</th>
  <th style="width:9%">done</th>
  <th style="width:9%">ready</th>
  <th style="width:9%">claim</th>
  <th style="width:9%">bailed</th>
  <th style="width:10%">blocked</th>
</tr></thead><tbody>`;

  for(const [g,c] of Object.entries(groups).sort()){
    html += `<tr>
  <td title="${esc(g)}">${esc(g)}</td>
  <td>${bar(c.done,c.total)}</td>
  <td class="s-done">${c.done}</td>
  <td class="s-ready">${c.ready}</td>
  <td class="s-claimed">${c.claimed}</td>
  <td class="s-bailed">${c.bailed}</td>
  <td class="s-blocked">${c.blocked}</td>
</tr>`;
  }
  html += `</tbody></table>`;

  // ── active workers ────────────────────────────────────────────────────────
  html += `<h2>Active workers (${activeWorkers.length})</h2>`;
  if(activeWorkers.length===0){
    html += `<p style="color:var(--muted)">No active workers.</p>`;
  } else {
    html += `<table>
<thead><tr>
  <th style="width:28%">worker</th>
  <th style="width:12%">status</th>
  <th style="width:32%">current job</th>
  <th style="width:28%">last active</th>
</tr></thead><tbody>`;
    for(const w of activeWorkers){
      const job = w.current_job ?? "—";
      const la  = w.last_active  ?? "—";
      html += `<tr>
  <td title="${esc(w.id)}">${esc(w.id)}</td>
  <td>${badge(w.status)}</td>
  <td title="${esc(job)}">${esc(job)}</td>
  <td>${esc(la)}</td>
</tr>`;
    }
    html += `</tbody></table>`;
  }

  // ── queue snapshot ────────────────────────────────────────────────────────
  html += `<h2>Queue snapshot (top ${Math.min(20,queue.length)} of ${queue.length})</h2>`;
  if(queue.length===0){
    html += `<p style="color:var(--muted)">Queue is empty.</p>`;
  } else {
    const shown = queue.slice(0,20);
    html += `<table>
<thead><tr>
  <th style="width:4%">#</th>
  <th style="width:38%">job</th>
  <th style="width:18%">priority</th>
  <th style="width:20%">eta</th>
  <th style="width:20%">enqueued</th>
</tr></thead><tbody>`;
    for(let i=0;i<shown.length;i++){
      const q=shown[i];
      html += `<tr>
  <td>${i+1}</td>
  <td title="${esc(q.job_id)}">${esc(q.job_id)}</td>
  <td>${esc(q.priority??'')}</td>
  <td>${esc(q.eta??'')}</td>
  <td>${esc(q.enqueued_at??'')}</td>
</tr>`;
    }
    html += `</tbody></table>`;
  }

  // ── full job table ────────────────────────────────────────────────────────
  html += `<h2>All jobs (${total})</h2>
<table>
<thead><tr>
  <th style="width:30%">job id</th>
  <th style="width:12%">status</th>
  <th style="width:16%">worker</th>
  <th style="width:14%">started</th>
  <th style="width:14%">finished</th>
  <th style="width:14%">duration</th>
</tr></thead><tbody>`;

  for(const j of jobs){
    const dur = (j.started_at && j.finished_at)
      ? ((new Date(j.finished_at)-new Date(j.started_at))/1000).toFixed(1)+"s"
      : "";
    html += `<tr>
  <td title="${esc(j.job_id)}">${esc(j.job_id)}</td>
  <td>${badge(j.status)}</td>
  <td title="${esc(j.worker??'')}">${esc(j.worker??"—")}</td>
  <td>${esc(j.started_at??"—")}</td>
  <td>${esc(j.finished_at??"—")}</td>
  <td>${esc(dur||"—")}</td>
</tr>`;
  }
  html += `</tbody></table>`;

  // ── analysis charts ───────────────────────────────────────────────────────
  if(data.analysis){
    html += renderAnalysis(data.analysis);
  }

  document.getElementById("root").innerHTML = html;

  // post-render chart injection
  if(data.analysis) injectCharts(data.analysis);
}


// ── analysis section ─────────────────────────────────────────────────────────
function renderAnalysis(an){
  let html = `<h2>Analysis</h2>`;

  // linear — scalar metrics table
  if(an.linear){
    const L = an.linear;
    html += `<h3 style="font-size:.9rem;margin:.8rem 0 .3rem">Linear baseline</h3>
<table style="width:auto">
<thead><tr><th>metric</th><th>value</th></tr></thead><tbody>`;
    for(const [k,v] of Object.entries(L)){
      if(typeof v !== "object"){
        html += `<tr><td>${esc(k)}</td><td>${esc(typeof v==="number"?v.toFixed(4):v)}</td></tr>`;
      }
    }
    html += `</tbody></table>`;

    // linear chart: residuals or fit quality vs tau
    if(L.fit_by_tau){
      html += `<div class="chart-box" id="chart-linear-fit"></div>`;
    }
  }

  // nonlinear
  if(an.nonlinear){
    html += `<h3 style="font-size:.9rem;margin:.8rem 0 .3rem">Non-linear (by γ)</h3>`;

    // summary table
    const gammas = Object.keys(an.nonlinear).sort((a,b)=>+a-+b);
    html += `<table style="width:auto">
<thead><tr>
  <th>γ</th><th>R²</th><th>RMSE</th><th>iterations</th>
</tr></thead><tbody>`;
    for(const g of gammas){
      const e=an.nonlinear[g];
      html += `<tr>
  <td>${esc(g==="100.0"?"CARA":"γ="+g)}</td>
  <td>${typeof e.r2==="number"?e.r2.toFixed(4):esc(e.r2??"—")}</td>
  <td>${typeof e.rmse==="number"?e.rmse.toFixed(4):esc(e.rmse??"—")}</td>
  <td>${esc(e.iterations??"—")}</td>
</tr>`;
    }
    html += `</tbody></table>`;

    // chart placeholder
    html += `<div class="chart-box" id="chart-nl-fit"></div>`;
  }

  return html;
}

function injectCharts(an){
  // linear fit-by-tau
  if(an.linear?.fit_by_tau){
    const el = document.getElementById("chart-linear-fit");
    if(el){
      const pts = an.linear.fit_by_tau.map(([x,y])=>({x,y}));
      const yVals = pts.map(p=>p.y);
      const yMax  = Math.max(...yVals)*1.05;
      el.innerHTML = miniChart({
        series:[{label:"1−R²", color:"#1f6feb", pts}],
        xLabel:"Signal precision τ", yLabel:"1−R²",
        xLog:true, xMin:0.1, xMax:20, yMin:0, yMax:yMax,
        hLines:[{y:0,color:"#999",dash:"4 2"}]
      });
    }
  }

  // nonlinear fit-by-tau per gamma
  if(an.nonlinear){
    const el = document.getElementById("chart-nl-fit");
    if(el){
      const gammas = Object.keys(an.nonlinear).sort((a,b)=>+a-+b);
      const data   = {};
      for(const g of gammas){
        if(an.nonlinear[g].fit_by_tau) data[g] = an.nonlinear[g].fit_by_tau;
      }
      if(Object.keys(data).length){
        const series = gammas.map(g => ({
          label: g==="100.0" ? "CARA" : `γ=${g}`,
          color: nlGammaColor(g),
          pts: data[g].map(([x,y])=>({x,y}))
        }));
        const allY1 = series.flatMap(s=>s.pts.map(p=>p.y));
        const yMax1 = Math.max(...allY1)*1.05;
        el.innerHTML = miniChart({series, xLabel:"Signal precision τ", yLabel:"1−R²",
                              xLog:true, xMin:0.1, xMax:20, yMin:0, yMax:yMax1,
                              hLines:[{y:0,color:"#999",dash:"4 2"}]});
      }
    }
  }
}


// ── bootstrap: fetch status.json from same dir ───────────────────────────────
(async () => {
  try {
    const resp = await fetch("status.json");
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    render(data);
  } catch(e) {
    document.getElementById("root").innerHTML =
      `<p style="color:red">Failed to load status.json: ${esc(String(e))}</p>`;
  }
})();
</script>
