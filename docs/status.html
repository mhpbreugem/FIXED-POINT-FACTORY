<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>fixed-point-factory — status</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg: #fafafa; --fg: #222; --muted: #888;
    --done: #2a7a2e; --ready: #1f6feb; --claimed: #b78700;
    --bailed: #b1260f; --blocked: #999; --skip: #ccc;
    --row: #fff; --rowalt: #f3f3f3; --hdr: #e8e8e8;
    --stale: #b1260f;
  }
  body { font-family: ui-sans-serif, system-ui, sans-serif;
         background: var(--bg); color: var(--fg); margin: 0; padding: 1.5rem; }
  h1 { font-size: 1.25rem; margin: 0 0 0.5rem 0; }
  h2 { font-size: 1rem; margin: 1.5rem 0 0.5rem 0; }
  h3 { font-size: 0.95rem; margin: 1.2rem 0 0.4rem 0; color: #333; }
  .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; }
  .summary { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 0.5rem 0 1rem 0; }
  .pill { padding: 0.2rem 0.6rem; border-radius: 0.4rem; font-size: 0.85rem;
          color: white; font-weight: 600; }
  .pill.done    { background: var(--done); }
  .pill.ready   { background: var(--ready); }
  .pill.claimed { background: var(--claimed); }
  .pill.blocked { background: var(--blocked); }
  .pill.bailed  { background: var(--bailed); }
  .pill.skip    { background: var(--skip); color: #444; }
  table { border-collapse: collapse; width: 100%; font-size: 0.85rem;
          background: var(--row); }
  th, td { text-align: left; padding: 0.35rem 0.6rem; border-bottom: 1px solid #eee; }
  th { background: var(--hdr); font-weight: 600; cursor: pointer; user-select: none;
       position: sticky; top: 0; }
  th:hover { background: #ddd; }
  tr:nth-child(even) td { background: var(--rowalt); }
  td.status { font-weight: 600; }
  td.status.done    { color: var(--done); }
  td.status.ready   { color: var(--ready); }
  td.status.claimed { color: var(--claimed); }
  td.status.blocked { color: var(--blocked); }
  td.status.bailed  { color: var(--bailed); }
  td.status.skip    { color: #aaa; }
  .tabs { display: flex; gap: 0.3rem; margin-bottom: 1rem; }
  .tab { padding: 0.3rem 0.8rem; border: 1px solid #ccc; border-radius: 0.3rem;
         cursor: pointer; background: #fff; font-size: 0.85rem; }
  .tab.active { background: #222; color: #fff; border-color: #222; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .err { color: var(--bailed); }
  .stale { color: var(--stale); font-weight: 600; }
  .mono { font-family: ui-monospace, monospace; font-size: 0.8rem; }
  .small { font-size: 0.8rem; color: var(--muted); }
  .live  { font-size: 0.8rem; color: var(--claimed); font-family: ui-monospace, monospace; }
  .enorm { font-size: 0.8rem; color: var(--done);    font-family: ui-monospace, monospace; }
  .controls { margin: 0.5rem 0 0.8rem 0; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
  .controls input { padding: 0.3rem 0.5rem; border: 1px solid #ccc; border-radius: 0.3rem; width: 220px; }
  .workers-inline { margin-top: 1.2rem; font-size: 0.82rem; color: var(--muted); }
  svg.chart { overflow: visible; }
  .chart-wrap { margin: 0.5rem 0 1.5rem 0; }
  /* mini chart axis */
  .axis-label { font-size: 10px; fill: #888; }
  .grid-line { stroke: #eee; stroke-width: 1; }
  .paper-section { margin: 2rem 0 0.5rem 0; padding: 0.5rem 0 0 0;
                   border-top: 2px solid #ddd; }
  .nl-badge { display: inline-block; font-size: 0.7rem; background: #e8e8e8;
              border-radius: 0.3rem; padding: 0.1rem 0.4rem; color: #555;
              vertical-align: middle; margin-left: 0.4rem; }
  table.nl-table { font-size: 0.82rem; border-collapse: collapse; width: auto; min-width: 420px; }
  .heatcell { font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<h1>fixed-point-factory — <span id="project-label">REZN</span></h1>
<p class="meta" id="meta">loading…</p>

<div class="tabs">
  <button class="tab active" onclick="switchTab(this,'tasks')">Tasks</button>
  <button class="tab" onclick="switchTab(this,'figures')">Figures</button>
</div>

<div id="tab-tasks" class="tab-content active">
  <div class="summary" id="summary"></div>
  <div class="controls">
    <input type="text" id="filter" placeholder="filter id, status, γ…" oninput="renderTasks()">
    <button onclick="loadAll()">refresh now</button>
  </div>
  <table id="task-table">
    <thead><tr>
      <th onclick="sortBy('id')">id</th>
      <th onclick="sortBy('status')">status</th>
      <th onclick="sortBy('gamma')">&#947;</th>
      <th onclick="sortBy('tau')">&#964;</th>
      <th>live iter · ftol</th>
      <th onclick="sortBy('F_max')">&#8214;F&#8214;&#8734;</th>
      <th onclick="sortBy('1-R2')">1&#8209;R²</th>
      <th>checkpoint</th>
    </tr></thead>
    <tbody id="task-body"></tbody>
  </table>
  <div class="workers-inline" id="workers-inline"></div>
</div>

<div id="tab-figures" class="tab-content">
  <div id="fig-area"></div>
</div>

<script>
  const OWNER = "mhpbreugem", REPO = "fixed-point-factory", BRANCH = "main";
  const PROJECT = "REZN";
  let taskData = null, workerData = null, progressData = {};
  let sortCol = "id", sortAsc = true;
  let FIGDATA = null;

  function rawUrl(path) {
    return `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${path}`;
  }
  function apiUrl(path) {
    return `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`;
  }

  async function fetchJson(url) {
    const r = await fetch(url, {cache:"no-store"});
    if (!r.ok) throw new Error(`${r.status} ${r.statusText} — ${url}`);
    return r.json();
  }
  async function fetchText(url) {
    const r = await fetch(url, {cache:"no-store"});
    if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
    return r.text();
  }

  function switchTab(btn, name) {
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(d => d.classList.remove("active"));
    document.getElementById(`tab-${name}`).classList.add("active");
    btn.classList.add("active");
    if (name === "figures") renderFigures();
  }

  function esc(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // TASK LOADING
  // ═══════════════════════════════════════════════════════════════════════════

  async function loadTasks() {
    const data = await fetchJson(rawUrl(`projects/${PROJECT}/TASK_QUEUE.json`));
    taskData = data;
    renderTasks();
    document.getElementById("meta").textContent =
      `last refresh: ${new Date().toLocaleTimeString()}  ·  updated_at: ${data.updated_at || "?"}  ·  project: ${PROJECT}`;
  }

  function renderTasks() {
    if (!taskData) return;
    const tasks = taskData.tasks || [];
    const filterVal = (document.getElementById("filter")?.value || "").toLowerCase();

    // summary pills
    const counts = {};
    tasks.forEach(t => { counts[t.status] = (counts[t.status]||0)+1; });
    const pillOrder = ["done","ready","claimed","blocked","bailed","skip"];
    document.getElementById("summary").innerHTML =
      pillOrder.filter(s => counts[s]).map(s =>
        `<span class="pill ${s}">${s}: ${counts[s]}</span>`).join("") +
      `<span class="pill" style="background:#555">total: ${tasks.length}</span>`;

    // filter + sort
    const filtered = tasks.filter(t => {
      if (!filterVal) return true;
      return t.id.toLowerCase().includes(filterVal) ||
             t.status.toLowerCase().includes(filterVal) ||
             String(t.gamma||"").includes(filterVal) ||
             String(t.tau||"").includes(filterVal);
    });
    const sorted = [...filtered].sort((a,b) => {
      let av = a[sortCol] ?? a.result?.[sortCol] ?? "";
      let bv = b[sortCol] ?? b.result?.[sortCol] ?? "";
      if (typeof av === "number" && typeof bv === "number")
        return sortAsc ? av-bv : bv-av;
      return sortAsc ? String(av).localeCompare(String(bv))
                     : String(bv).localeCompare(String(av));
    });

    // render rows
    document.getElementById("task-body").innerHTML = sorted.map(t => {
      const r2 = t.result?.["1-R2"];
      const r2str = r2 != null ? r2.toPrecision(3) : "";
      const fmax = t.result?.F_max ?? t.result?.F_max_bound;
      const fmaxStr = fmax != null ? Number(fmax).toExponential(1) : "";
      const pr = progressData[t.id];
      let liveStr = "";
      if (t.status === "claimed" && pr) {
        liveStr = `<div class="live">${pr.iter} · ${pr.ftol != null ? Number(pr.ftol).toExponential(1) : ""}</div>`;
      }
      const ckpt = t.checkpoint;
      const ckptCell = ckpt
        ? `<a href="https://github.com/${OWNER}/${REPO}/blob/${BRANCH}/${ckpt}" target="_blank" class="mono" style="font-size:0.78rem">${ckpt.split("/").pop()}</a>`
        : "";
      return `<tr>
        <td class="mono">${esc(t.id)}</td>
        <td class="status ${t.status}">${t.status}</td>
        <td>${t.gamma != null ? t.gamma : ""}</td>
        <td>${t.tau  != null ? t.tau  : ""}</td>
        <td>${liveStr}</td>
        <td class="enorm">${fmaxStr}</td>
        <td>${r2str}</td>
        <td>${ckptCell}</td>
      </tr>`;
    }).join("");

    renderWorkersInline();
  }

  function sortBy(col) {
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    renderTasks();
  }

  // ═══════════════════════════════════════════════════════════════════════════
  // WORKER / PROGRESS LOADING
  // ═══════════════════════════════════════════════════════════════════════════

  async function loadWorkers() {
    try {
      const hbDir = await fetchJson(apiUrl(`projects/${PROJECT}/heartbeats`));
      workerData = Array.isArray(hbDir) ? hbDir : [];
    } catch { workerData = []; }
  }

  async function loadProgress() {
    try {
      const pDir = await fetchJson(apiUrl(`projects/${PROJECT}/progress`));
      if (!Array.isArray(pDir)) return;
      progressData = {};
      await Promise.all(pDir.filter(f => f.name.endsWith(".json")).map(async f => {
        try {
          const d = await fetchJson(rawUrl(`projects/${PROJECT}/progress/${f.name}`));
          progressData[d.task_id] = d;
        } catch {}
      }));
      renderTasks();
    } catch {}
  }

  function renderWorkersInline() {
    const el = document.getElementById("workers-inline");
    if (!el) return;
    if (!workerData || workerData.length === 0) {
      el.innerHTML = "<em>no active workers</em>";
      return;
    }
    const now = Date.now();
    const rows = workerData.map(f => {
      const workerName = f.name.replace(".txt","");
      const hbAge = f.last_modified ? Math.round((now - new Date(f.last_modified).getTime())/60000) : null;
      const isStale = hbAge != null && hbAge > 10;
      const pr = progressData[workerName] || Object.values(progressData).find(p => p.worker_id === workerName);
      const taskId = pr ? pr.task_id : "—";
      const iter   = pr ? pr.iter : "—";
      const ftol   = pr?.ftol != null ? Number(pr.ftol).toExponential(1) : "—";
      const ageStr = hbAge != null ? (isStale ? `<span class="stale">${hbAge}m ago</span>` : `${hbAge}m ago`) : "?";
      return `<tr>
        <td class="mono">${esc(workerName)}</td>
        <td class="mono">${esc(taskId)}</td>
        <td>${ageStr}</td>
        <td>${iter}</td>
        <td class="mono">${ftol}</td>
      </tr>`;
    }).join("");
    el.innerHTML = `<strong>Workers</strong>
      <table style="font-size:0.82rem;margin-top:0.4rem">
        <thead><tr><th>worker</th><th>task</th><th>heartbeat</th><th>iter</th><th>ftol</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function renderWorkers() { renderWorkersInline(); }

  // ═══════════════════════════════════════════════════════════════════════════
  // LOAD ALL
  // ═══════════════════════════════════════════════════════════════════════════

  async function loadAll() {
    document.getElementById("meta").textContent = "loading…";
    try {
      await loadTasks();
      await Promise.all([loadWorkers(), loadProgress(), loadFiguresData()]);
      if (document.getElementById("tab-figures").classList.contains("active"))
        renderFigures();
    } catch (e) {
      document.getElementById("meta").innerHTML = `<span class="err">error: ${esc(e.message)}</span>`;
    }
  }

  loadAll();
  setInterval(loadAll, 30000);

  // ═══════════════════════════════════════════════════════════════════════════
  // FIGURES TAB
  // ═══════════════════════════════════════════════════════════════════════════

  const STATUS_COLOR = {
    done: "#2a7a2e", ready: "#1f6feb", claimed: "#b78700",
    bailed: "#b1260f", blocked: "#bbb", skip: "#ccc"
  };

  // ——— SVG mini-chart helper ———
  function miniChart({
    data,        // [{x, y, color?, label?}] or [{x, y}]
    series,      // [{label, color, pts:[{x,y}]}]  (alternative to data)
    width=520, height=200, padL=50, padR=20, padT=15, padB=40,
    xLabel="", yLabel="", title="",
    xLog=false, yLog=false,
    xMin, xMax, yMin, yMax,
    hLines=[],    // [{y, color, dash}]
    refLine,      // {slope, intercept, color}  y = slope*x + intercept
    dots=true, lines=true,
  }) {
    // collect all points
    const allPts = series ? series.flatMap(s=>s.pts) : (data||[]);
    const xs = allPts.map(p=>p.x), ys = allPts.map(p=>p.y);
    const x0 = xMin ?? Math.min(...xs), x1 = xMax ?? Math.max(...xs);
    const y0 = yMin ?? Math.min(...ys), y1 = yMax ?? Math.max(...ys);
    const W = width-padL-padR, H = height-padT-padB;

    const px = x => padL + (xLog ? Math.log(x/x0)/Math.log(x1/x0)*W : (x-x0)/(x1-x0)*W);
    const py = y => padT + H - (yLog ? Math.log(Math.max(y,1e-9)/y0)/Math.log(y1/y0)*H : (y-y0)/(y1-y0)*H);

    let svg = `<svg class="chart" width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" xmlns="http://www.w3.org/2000/svg">`;

    // grid lines + x ticks
    const nxt = 6;
    for (let i=0;i<=nxt;i++) {
      const xv = xLog ? x0*Math.pow(x1/x0,i/nxt) : x0+(x1-x0)*i/nxt;
      const xp = px(xv);
      svg += `<line x1="${xp}" y1="${padT}" x2="${xp}" y2="${padT+H}" class="grid-line"/>`;
      svg += `<text x="${xp}" y="${padT+H+14}" text-anchor="middle" class="axis-label">${xv<0.01?xv.toExponential(0):(xv>=100?xv.toFixed(0):xv.toPrecision(2))}</text>`;
    }
    const nyt = 5;
    for (let i=0;i<=nyt;i++) {
      const yv = yLog ? y0*Math.pow(y1/y0,i/nyt) : y0+(y1-y0)*i/nyt;
      const yp = py(yv);
      svg += `<line x1="${padL}" y1="${yp}" x2="${padL+W}" y2="${yp}" class="grid-line"/>`;
      svg += `<text x="${padL-4}" y="${yp+4}" text-anchor="end" class="axis-label">${yv.toPrecision(2)}</text>`;
    }

    // axis labels
    if (xLabel) svg += `<text x="${padL+W/2}" y="${height-4}" text-anchor="middle" class="axis-label" font-size="11">${xLabel}</text>`;
    if (yLabel) svg += `<text x="12" y="${padT+H/2}" text-anchor="middle" class="axis-label" font-size="11" transform="rotate(-90,12,${padT+H/2})">${yLabel}</text>`;
    if (title)  svg += `<text x="${padL+W/2}" y="${padT-3}" text-anchor="middle" class="axis-label" font-size="11" fill="#444">${title}</text>`;

    // hLines
    hLines.forEach(({y,color="#ccc",dash="4 2"}) => {
      svg += `<line x1="${padL}" y1="${py(y)}" x2="${padL+W}" y2="${py(y)}" stroke="${color}" stroke-width="1" stroke-dasharray="${dash}"/>`;
    });

    // series or single data
    const seriesList = series || [{label:null, color:"#1f6feb", pts: data||[]}];
    seriesList.forEach(s => {
      const pts = s.pts.filter(p => p.y != null && isFinite(p.y));
      if (lines && pts.length > 1) {
        const pathD = pts.map((p,i)=>`${i===0?"M":"L"}${px(p.x).toFixed(1)},${py(p.y).toFixed(1)}`).join(" ");
        svg += `<path d="${pathD}" fill="none" stroke="${s.color||'#1f6feb'}" stroke-width="1.5"/>`;
      }
      if (dots) pts.forEach(p => {
        svg += `<circle cx="${px(p.x).toFixed(1)}" cy="${py(p.y).toFixed(1)}" r="3" fill="${s.color||p.color||'#1f6feb'}" opacity="0.85"/>`;
      });
    });

    // legend
    if (series && series.length > 1) {
      let lx = padL + W - 10, ly = padT + 10;
      [...series].reverse().forEach(s => {
        svg += `<rect x="${lx-36}" y="${ly-8}" width="14" height="3" fill="${s.color}"/>`;
        svg += `<text x="${lx-18}" y="${ly+3}" class="axis-label" font-size="10" fill="${s.color}">${s.label||""}</text>`;
        ly += 14;
      });
    }

    svg += `</svg>`;
    return svg;
  }

  // ——— Task-queue scatter: 1-R² vs τ per γ slice ———
  function renderScatter(map) {
    const gammas = [0.1, 0.25, 0.35, 0.5, 1.0, 1.4, 2.0, 4.0];
    const colors = ["#d62728","#bcbd22","#1f77b4","#ff7f0e","#9467bd","#8c564b","#2ca02c"];
    const series = gammas.map((g,i) => ({
      label: `γ=${g}`,
      color: colors[i],
      pts: (map.get(g)||[]).map(t => ({x:t.tau, y:t["1-R2"]})).filter(p=>p.y!=null)
    })).filter(s=>s.pts.length);
    return miniChart({series, xLabel:"τ", yLabel:"1‑R² (REE)", xLog:false,
                      xMin:0, xMax:11, yMin:0, yMax:0.12, dots:true, lines:true,
                      hLines:[{y:0,color:"#aaa",dash:"2 2"}]});
  }

  // ——— γ-sweep table (cross-section at fixed τ) ———
  function lookup(map, gamma, tau) {
    const arr = map.get(gamma)||[];
    const t = arr.find(x => Math.abs(x.tau - tau) < 0.001);
    return t ? t["1-R2"] : null;
  }

  function renderGammaTable(id, gammas, tau, map) {
    const el = document.getElementById(id);
    if (!el) return;
    const rows = gammas.map(g => {
      const v = lookup(map, g, tau);
      return `<tr><td>γ = ${g}</td><td>${v != null ? v.toFixed(4) : '<span style="color:#aaa">pending</span>'}</td></tr>`;
    });
    el.innerHTML = `<table style="font-size:0.85rem">
      <thead><tr><th>Risk aversion γ</th><th>1‑R² (REE, τ=${tau})</th></tr></thead>
      <tbody>${rows.join("")}</tbody>
    </table><p style="font-size:0.78rem;color:#888;margin-top:0.3rem">
      Tab. D footnote: weighted 1‑R² at τ=${tau}.
    </p>`;
  }

  // ——— Grid-params table ———
  function renderGridTable(id, map) {
    const el = document.getElementById(id);
    if (!el) return;
    const allTasks = [];
    map.forEach((arr) => arr.forEach(t => allTasks.push(t)));
    const done = allTasks.filter(t => t.status==="done" && t.result);
    if (!done.length) { el.innerHTML="<p>No done tasks yet.</p>"; return; }
    el.innerHTML = `<table style="font-size:0.82rem">
      <thead><tr><th>Task</th><th>γ</th><th>τ</th><th>1‑R²</th><th>F_max</th><th>n_triples</th></tr></thead>
      <tbody>${done.map(t=>`<tr>
        <td class="mono">${esc(t.id)}</td><td>${t.gamma}</td><td>${t.tau}</td>
        <td>${t.result["1-R2"]?.toFixed(4)||""}</td>
        <td class="mono">${t.result.F_max!=null ? Number(t.result.F_max).toExponential(1) : ""}</td>
        <td>${t.result.n_triples||""}</td>
      </tr>`).join("")}</tbody>
    </table>`;
  }

  // ——— Colour palette ———
  const NL_GAMMA_COLOR = {
    "0.1":"#9c27b0","0.25":"#e31a1c","0.3":"#e31a1c","0.5":"#1f77b4",
    "1.0":"#ff7f0e","1.4":"#bcbd22","2.0":"#9467bd",
    "3.0":"#2ca02c","4.0":"#2ca02c","10.0":"#8c564b","100.0":"#aaa",
  };
  const PRICE_COLOR = {"0.2":"#1f77b4","0.3":"#ff7f0e","0.5":"#2ca02c","0.7":"#d62728","0.8":"#9467bd"};
  function nlGammaColor(g) { return NL_GAMMA_COLOR[String(g)] || "#888"; }

  function heatColor(v, lo, hi) {
    const t = Math.max(0, Math.min(1, (v-lo)/(hi-lo)));
    return `rgb(${Math.round(255*t)},${Math.round(40+40*(1-t))},${Math.round(200*(1-t))})`;
  }

  // ——— Main figures render entry point ———
  function renderFigures() {
    if (!taskData) return;
    const el = document.getElementById("fig-area");
    const map = new Map();
    (taskData.tasks||[]).forEach(t => {
      if (t.gamma == null || t.test) return;
      if (!map.has(t.gamma)) map.set(t.gamma, []);
      map.get(t.gamma).push(t);
    });

    el.innerHTML = `
    <div class="paper-section">
      <h2>Fig. 1 — Revelation deficit vs τ <span class="nl-badge">no-learning</span></h2>
      <p style="font-size:0.85rem;color:#555">Weighted 1−R² vs signal precision τ for γ∈{0.5,1,4} and CARA.
         Every finite γ produces a hump-shaped positive deficit. CARA sits at zero for all τ — the knife-edge.
         K=3, W=1, G=15.</p>
      <div class="chart-wrap" id="chart-fig1"></div>
    </div>

    <div class="paper-section">
      <h2>Fig. 2 — Price-function contours <span class="nl-badge">no-learning</span></h2>

  // ——— REE scatter panels ———
  function renderScatterByGamma(map, gammas) {
    const colors = {"0.1":"#9c27b0","0.5":"#1f77b4","1.0":"#ff7f0e","4.0":"#2ca02c"};
    const series = gammas.map(g => ({
      label: `γ=${g}`,
      color: colors[String(g)] || nlGammaColor(g),
      pts: (map.get(g)||[]).filter(t=>t.result?.["1-R2"]!=null)
                           .map(t=>({x:t.tau, y:t.result["1-R2"]}))
    })).filter(s=>s.pts.length);
    if (!series.length) return `<p style="color:#aaa;font-size:0.82rem">No converged REE tasks yet.</p>`;
    const allY = series.flatMap(s=>s.pts.map(p=>p.y));
    const yMaxSc = Math.max(...allY)*1.15;
    return miniChart({series, xLabel:"τ", yLabel:"1−R² (REE)",
                      xMin:0, xMax:11, yMin:0, yMax:yMaxSc,
                      hLines:[{y:0,color:"#ccc",dash:"2 2"}]});
  }

  // ——— Fig 3b: REE vs NL vs gamma at tau=2 ———
  function renderFig3b(map) {
    const el = document.getElementById("chart-fig3b");
    if (!el || !FIGDATA) return;
    const series = [];
    // REE from task queue at tau=2
    const reePts = [];
    map.forEach((arr, g) => {
      const t = arr.find(x => Math.abs(x.tau-2.0)<0.01 && x.result?.["1-R2"]!=null);
      if (t) reePts.push({x:g, y:t.result["1-R2"]});
    });
    reePts.sort((a,b)=>a.x-b.x);
    if (reePts.length) series.push({label:"REE", color:"#1f77b4", pts:reePts});
    // NL from fig1_nl_lines at tau≈2
    const nlPts = [];
    const gammaKeys = Object.keys(FIGDATA.fig1_nl_lines||{});
    for (const gk of gammaKeys) {
      const line = FIGDATA.fig1_nl_lines[gk];
      const pt = line.find(([t])=>Math.abs(t-2.0)<0.15);
      if (pt) nlPts.push({x:parseFloat(gk), y:pt[1]});
    }
    nlPts.sort((a,b)=>a.x-b.x);
    if (nlPts.length) series.push({label:"No-learning", color:"#d62728", pts:nlPts});
    if (!series.length) { el.innerHTML=`<p style="color:#aaa;font-size:0.82rem">No data.</p>`; return; }
    const allY3b = series.flatMap(s=>s.pts.map(p=>p.y));
    el.innerHTML = miniChart({series, xLabel:"γ", yLabel:"1−R²",
                              xLog:true, xMin:0.1, xMax:10, yMin:0,
                              yMax: allY3b.length ? Math.max(...allY3b)*1.1 : 0.5,
                              hLines:[{y:0,color:"#ccc",dash:"2 2"}]});
  }

  // ——— Fig 4: price vs T* scatter (sample of done tasks) ———
  function renderFig4(map) {
    const el = document.getElementById("chart-fig4");
    if (!el) return;
    // Use task queue slope/intercept data to draw the REE regression line
    // and compare with fully-revealing benchmark
    const pts050 = (map.get(0.5)||[]).filter(t=>t.result?.["1-R2"]!=null && t.result?.slope!=null);
    if (!pts050.length) { el.innerHTML=`<p style="color:#aaa;font-size:0.82rem">No converged γ=0.5 tasks with slope data.</p>`; return; }
    // Use the seed: slope≈0.543, tau=2, so logit(p) ≈ 0.543*T* + intercept
    // FR benchmark: logit(p) = T*/3
    const Trange = Array.from({length:41}, (_,i)=>-10+i*0.5);
    const series = [];
    // FR line
    series.push({label:"Fully revealing p=Λ(T*/3)", color:"#aaa",
                 pts:Trange.map(T=>({x:T, y:1/(1+Math.exp(-T/3))}))});
    // REE line for each gamma with slope data
    const gammasCurve = [0.5,1.0,2.0];
    const colors = {"0.5":"#1f77b4","1.0":"#ff7f0e","2.0":"#9467bd"};
    gammasCurve.forEach(g=>{
      const tasks = (map.get(g)||[]).filter(t=>t.result?.slope!=null);
      if (!tasks.length) return;
      // Use average slope
      const slope = tasks.reduce((s,t)=>s+t.result.slope,0)/tasks.length;
      // FR slope=1/3 at tau=2 → intercept≈0; use same for REE
      series.push({label:`γ=${g} REE (slope≈${slope.toFixed(2)})`, color:colors[String(g)],
                   pts:Trange.map(T=>({x:T, y:1/(1+Math.exp(-slope*T))}))});
    });
    el.innerHTML = miniChart({series, xLabel:"T* = τ(u₁+u₂+u₃)", yLabel:"price p",
                              xMin:-10, xMax:10, yMin:0, yMax:1,
                              dots:false, lines:true,
                              hLines:[{y:0.5,color:"#eee",dash:"2 2"}]});
  }

  // ——— Fig 2: multi-price contours ———
  function renderFig2Contours(data) {
    const caraEl = document.getElementById("chart-contour-cara-multi");
    const crraEl = document.getElementById("chart-contour-crra-multi");
    if (!caraEl && !crraEl) return;
    const prices = data.prices || [0.2,0.3,0.5,0.7,0.8];

    function multiContourSVG(contoursByPrice, title) {
      const W=280, H=240, pad=35;
      const uMin=-3.2, uMax=3.2;
      const sc = v => pad + (v-uMin)/(uMax-uMin)*(W-2*pad);
      const scY = v => H-pad - (v-uMin)/(uMax-uMin)*(H-2*pad);
      let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" class="chart">`;
      // axes
      svg += `<line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#ccc" stroke-width="1"/>`;
      svg += `<line x1="${pad}" y1="${pad}" x2="${pad}" y2="${H-pad}" stroke="#ccc" stroke-width="1"/>`;
      // zero lines
      const z=sc(0);
      svg += `<line x1="${z}" y1="${pad}" x2="${z}" y2="${H-pad}" stroke="#f0f0f0" stroke-width="1"/>`;
      svg += `<line x1="${pad}" y1="${scY(0)}" x2="${W-pad}" y2="${scY(0)}" stroke="#f0f0f0" stroke-width="1"/>`;
      // tick labels
      [-3,-2,-1,0,1,2,3].forEach(v=>{
        svg += `<text x="${sc(v)}" y="${H-pad+12}" text-anchor="middle" class="axis-label">${v}</text>`;
        svg += `<text x="${pad-5}" y="${scY(v)+4}" text-anchor="end" class="axis-label">${v}</text>`;
      });
      svg += `<text x="${W/2}" y="${H-3}" text-anchor="middle" class="axis-label" font-size="11">u₂</text>`;
      svg += `<text x="10" y="${H/2}" text-anchor="middle" class="axis-label" font-size="11" transform="rotate(-90,10,${H/2})">u₃</text>`;
      svg += `<text x="${W/2}" y="12" text-anchor="middle" class="axis-label" font-size="11" fill="#444">${title}</text>`;
      // contours
      prices.forEach(p => {
        const pk = String(p);
        const pts = contoursByPrice[pk];
        if (!pts || !pts.length) return;
        const color = PRICE_COLOR[pk] || "#888";
        const d = pts.map(([u2,u3],i)=>`${i===0?"M":"L"}${sc(u2).toFixed(1)},${scY(u3).toFixed(1)}`).join(" ");
        svg += `<path d="${d}" fill="none" stroke="${color}" stroke-width="1.8" opacity="0.9"/>`;
        // label at right end
        const last = pts[pts.length-1];
        if (last) svg += `<text x="${sc(last[0])+3}" y="${scY(last[1])+4}" font-size="9" fill="${color}">${p}</text>`;
      });
      svg += `</svg>`;
      return svg;
    }

    if (caraEl) caraEl.innerHTML = multiContourSVG(data.cara, "CARA: straight, parallel");
    if (crraEl) crraEl.innerHTML = multiContourSVG(data.crra, "CRRA (γ=0.5): curved, non-parallel");
  }

  // ——— Symmetric K-sweep chart ———
  function renderSymKSweep(tasks) {
    const el = document.getElementById("chart-symk");
    const tbl = document.getElementById("tbl-symk");
    const symTasks = tasks.filter(t => t.symmetric && /^symK\d/.test(t.id))
                          .sort((a,b) => (a.K||0)-(b.K||0));
    if (!el) return;
    if (!symTasks.length) {
      el.innerHTML = `<p style="color:#aaa;font-size:0.82rem">No symmetric K tasks found in queue.</p>`;
      return;
    }
    const donePts = symTasks.filter(t => t.result?.["1-R2"] != null)
                            .map(t => ({x: t.K, y: t.result["1-R2"]}));
    if (donePts.length >= 2) {
      el.innerHTML = miniChart({
        data: donePts,
        xLabel: "K (agents)", yLabel: "1−R² (sym REE)",
        xMin: 3, xMax: 8, yMin: 0,
        yMax: Math.max(...donePts.map(p=>p.y)) * 1.2,
        dots: true, lines: true,
        hLines: [{y:0,color:"#ccc",dash:"2 2"}]
      });
    } else if (donePts.length === 1) {
      el.innerHTML = `<p style="color:#888;font-size:0.82rem">1 result so far (K=${donePts[0].x}: 1-R²=${donePts[0].y.toFixed(6)}). More tasks pending.</p>`;
    } else {
      el.innerHTML = `<p style="color:#aaa;font-size:0.82rem">Awaiting first symK result.</p>`;
    }
    if (tbl) {
      tbl.innerHTML = `<table style="font-size:0.82rem;margin-top:0.5rem">
        <thead><tr><th>K</th><th>Status</th><th>1-R²</th><th>F_max</th><th>cells</th><th>wall_s</th></tr></thead>
        <tbody>${symTasks.map(t=>`<tr>
          <td>${t.K}</td>
          <td class="status ${t.status}">${t.status}</td>
          <td>${t.result?.["1-R2"] != null ? t.result["1-R2"].toFixed(6) : '<span style="color:#aaa">—</span>'}</td>
          <td class="mono">${t.result?.F_max != null ? Number(t.result.F_max).toExponential(1) : ''}</td>
          <td class="mono">${t.result?.n_cells ?? ''}</td>
          <td>${t.result?.wall_s != null ? t.result.wall_s+'s' : ''}</td>
        </tr>`).join('')}</tbody>
      </table>`;
    }
  }

  // ——— Fig 1: NL 1-R² vs tau line chart ———
  function renderFig1NLLines(data) {
    const el = document.getElementById("chart-fig1");
    if (!el) return;
    const gammas = Object.keys(data);
    const series = gammas.map(g => ({
      label: g==="100.0" ? "CARA" : `γ=${g}`,
      color: nlGammaColor(g),
      pts: data[g].map(([x,y])=>({x,y}))
    }));
    const allY1 = series.flatMap(s=>s.pts.map(p=>p.y));
    const yMax1 = Math.max(...allY1)*1.05;
    el.innerHTML = miniChart({series, xLabel:"Signal precision τ", yLabel:"1−R²",
                              xLog:true, xMin:0.1, xMax:20, yMin:0, yMax:yMax1,
                              hLines:[{y:0,color:"#999",dash:"4 2"}]});
  }

</script>
